<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Pattern</title>
    <style>
        :root {
            --bg: #06060b;
            --panel: #0f1016;
            --green: #00ff88;
            --red: #ff4757;
            --blue: #4facfe;
            --yellow: #ffd93d;
            --text: #c8d0e0;
            --dim: #4a5568;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        
        .screen {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.6s ease, transform 0.6s ease;
            transform: scale(0.95);
        }
        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1);
        }

        h1 { font-size: 1.8rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 10px; text-align: center; }
        .sub { color: var(--dim); font-size: 0.9rem; margin-bottom: 30px; text-align: center; max-width: 400px; line-height: 1.4; }

        /* SIMON GRID */
        #simon-container {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 20px 0;
        }
        .panel {
            position: absolute;
            width: 140px;
            height: 140px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s ease;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 3px solid rgba(255,255,255,0.1);
        }
        .panel:active { transform: scale(0.95); }
        .panel.active { 
            filter: brightness(1.6); 
            box-shadow: 0 0 40px currentColor;
            transform: scale(1.05);
        }
        .panel.green { background: linear-gradient(135deg, #00b862, var(--green)); color: var(--green); top: 0; left: 0; }
        .panel.red { background: linear-gradient(135deg, #c0392b, var(--red)); color: var(--red); top: 0; right: 0; }
        .panel.blue { background: linear-gradient(135deg, #2980b9, var(--blue)); color: var(--blue); bottom: 0; left: 0; }
        .panel.yellow { background: linear-gradient(135deg, #d4ac0d, var(--yellow)); color: var(--yellow); bottom: 0; right: 0; }
        
        .panel.disabled { cursor: not-allowed; opacity: 0.6; }

        #center-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            background: var(--panel);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 700;
            border: 3px solid #1a1b25;
            box-shadow: 0 0 30px rgba(0,0,0,0.6) inset;
            z-index: 10;
        }

        #status {
            margin-top: 25px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            color: var(--dim);
            min-height: 30px;
        }
        #status.playing { color: var(--blue); }
        #status.your-turn { color: var(--green); }
        #status.error { color: var(--red); }

        #round-indicator {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--dim);
            letter-spacing: 1px;
        }

        /* RIDDLE */
        #riddle-container { max-width: 85%; text-align: center; }
        #riddle-text { font-family: 'Courier New', monospace; font-size: clamp(1.1rem, 3vw, 1.6rem); line-height: 2.2; color: #e2e8f0; text-shadow: 0 0 15px rgba(140,190,255,0.6); }
        #riddle-text .line { opacity: 0; transform: translateY(20px); transition: all 1s ease; }
        .reveal #riddle-text .line:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.5s; }
        .reveal #riddle-text .line:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 1.1s; }
        .reveal #riddle-text .line:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 1.7s; }

        .feedback {
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0.8);
            font-size: 2.5rem; font-weight: 700; letter-spacing: 3px; opacity: 0; pointer-events: none; z-index: 50;
            transition: opacity 0.15s, transform 0.15s;
        }
        .feedback.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .feedback.good { color: var(--green); text-shadow: 0 0 25px rgba(0,255,136,0.6); }
        .feedback.bad { color: var(--red); text-shadow: 0 0 20px rgba(255,71,87,0.5); }

        /* Start Button */
        #start-btn {
            background: transparent;
            border: 2px solid var(--blue);
            color: var(--blue);
            padding: 14px 50px;
            font-size: 1rem;
            letter-spacing: 3px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.25s;
            margin-top: 20px;
            font-weight: 600;
        }
        #start-btn:hover { 
            background: var(--blue); 
            color: #000; 
            box-shadow: 0 0 30px rgba(79,172,254,0.5); 
            transform: translateY(-2px);
        }
        #start-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <div id="feedback" class="feedback"></div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen active">
        <h1>MEMORY PATTERN</h1>
        <div class="sub">Watch the sequence. Repeat it back. Each round adds one more step.</div>
        
        <div id="simon-container">
            <div class="panel green" data-color="0"></div>
            <div class="panel red" data-color="1"></div>
            <div class="panel blue" data-color="2"></div>
            <div class="panel yellow" data-color="3"></div>
            <div id="center-display">▶</div>
        </div>

        <div id="status">Press START to begin</div>
        <div id="round-indicator">Round 0 / 7</div>
        <button id="start-btn">START</button>
    </div>

    <!-- RIDDLE SCREEN -->
    <div id="riddle-screen" class="screen">
        <div id="riddle-container">
            <div id="riddle-text">
                <div class="line">I follow without being invited.</div>
                <div class="line">Animals have me but lose me when tamed.</div>
                <div class="line">Pull me and nothing comes out.</div>
            </div>
        </div>
    </div>

    <script>
        const panels = document.querySelectorAll('.panel');
        const centerDisplay = $('center-display');
        const statusEl = $('status');
        const roundEl = $('round-indicator');
        const startBtn = $('start-btn');
        const feedback = $('feedback');

        let sequence = [];
        let playerSequence = [];
        let currentRound = 0;
        let maxRounds = 7;
        let isPlayingSequence = false;
        let gameActive = false;

        const colors = ['green', 'red', 'blue', 'yellow'];
        const colorCodes = ['#00ff88', '#ff4757', '#4facfe', '#ffd93d'];

        function $(id) { return document.getElementById(id); }

        function showFeedback(text, type) {
            feedback.textContent = text;
            feedback.className = `feedback show ${type}`;
            setTimeout(() => feedback.className = 'feedback', 250);
        }

        function flashPanel(index, duration = 300) {
            return new Promise(resolve => {
                const panel = panels[index];
                panel.classList.add('active');
                centerDisplay.style.background = colorCodes[index];
                centerDisplay.style.boxShadow = `0 0 30px ${colorCodes[index]}`;
                
                setTimeout(() => {
                    panel.classList.remove('active');
                    centerDisplay.style.background = 'var(--panel)';
                    centerDisplay.style.boxShadow = '0 0 30px rgba(0,0,0,0.6) inset';
                    resolve();
                }, duration);
            });
        }

        function playSequence() {
            isPlayingSequence = true;
            gameActive = false;
            statusEl.textContent = 'WATCH...';
            statusEl.className = 'status playing';
            startBtn.disabled = true;
            
            // Disable panels during playback
            panels.forEach(p => p.classList.add('disabled'));

            setTimeout(async () => {
                for (let i = 0; i < sequence.length; i++) {
                    await flashPanel(sequence[i], 400);
                    await new Promise(r => setTimeout(r, 150));
                }
                
                isPlayingSequence = false;
                gameActive = true;
                playerSequence = [];
                statusEl.textContent = 'YOUR TURN';
                statusEl.className = 'status your-turn';
                panels.forEach(p => p.classList.remove('disabled'));
                centerDisplay.textContent = '✋';
            }, 800);
        }

        function nextRound() {
            currentRound++;
            roundEl.textContent = `Round ${currentRound} / ${maxRounds}`;
            
            if (currentRound > maxRounds) {
                // Victory!
                gameActive = false;
                showFeedback('PERFECT!', 'good');
                setTimeout(() => {
                    $('game-screen').classList.remove('active');
                    setTimeout(() => {
                        $('riddle-screen').classList.add('active');
                        $('riddle-screen').classList.add('reveal');
                    }, 400);
                }, 800);
                return;
            }

            // Add new random step
            sequence.push(Math.floor(Math.random() * 4));
            playSequence();
        }

        function handlePanelClick(e) {
            if (!gameActive || isPlayingSequence) return;
            
            const index = parseInt(e.target.dataset.color);
            flashPanel(index, 200);
            playerSequence.push(index);

            // Check if correct so far
            const currentIndex = playerSequence.length - 1;
            if (playerSequence[currentIndex] !== sequence[currentIndex]) {
                // Wrong!
                gameActive = false;
                statusEl.textContent = 'WRONG! Try again.';
                statusEl.className = 'status error';
                showFeedback('✗ FAIL', 'bad');
                centerDisplay.textContent = '✗';
                centerDisplay.style.background = 'var(--red)';
                
                setTimeout(() => {
                    resetGame();
                }, 1200);
                return;
            }

            // Check if round complete
            if (playerSequence.length === sequence.length) {
                gameActive = false;
                showFeedback('✓', 'good');
                centerDisplay.textContent = '✓';
                centerDisplay.style.background = 'var(--green)';
                
                setTimeout(() => {
                    nextRound();
                }, 800);
            }
        }

        function resetGame() {
            sequence = [];
            playerSequence = [];
            currentRound = 0;
            gameActive = false;
            isPlayingSequence = false;
            roundEl.textContent = 'Round 0 / 7';
            statusEl.textContent = 'Press START to begin';
            statusEl.className = 'status';
            startBtn.disabled = false;
            centerDisplay.textContent = '▶';
            centerDisplay.style.background = 'var(--panel)';
            centerDisplay.style.boxShadow = '0 0 30px rgba(0,0,0,0.6) inset';
            panels.forEach(p => p.classList.remove('disabled'));
        }

        // Event Listeners
        panels.forEach(panel => {
            panel.addEventListener('click', handlePanelClick);
            panel.addEventListener('touchstart', (e) => {
                e.preventDefault();
                handlePanelClick(e);
            });
        });

        startBtn.addEventListener('click', () => {
            resetGame();
            nextRound();
        });

        // Initialize
        resetGame();
    </script>
</body>
</html>
